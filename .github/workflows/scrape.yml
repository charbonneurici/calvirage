name: Scraper LNR Top 14

on:
  schedule:
    - cron: '0 6 * * 1'  # Chaque lundi à 6h (après le week-end de matchs)
  workflow_dispatch:       # Déclenchement manuel depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scripts/scrape-lnr.js

      - name: Commit fixtures si changement
        run: |
          git config user.name "CalVirage Bot"
          git config user.email "bot@calvirage.fr"
          git add data/fixtures.json
          git diff --staged --quiet || git commit -m "chore: mise à jour fixtures Top 14 $(date +%Y-%m-%d)"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
